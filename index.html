<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Creative Coding | Emerging Technologies | IMA Summer Institute '26</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="app"></div>

  <script>
    // https://docsify.js.org/#/
    window.$docsify = {
      // name: 'Creative Coding | Emerging Technologies | IMA Summer Institute \'26',
      repo: '',
      loadNavbar: true,
      // loadSidebar: true,
      loadSidebar: '_sidebar.md',
      alias: {
        '/.*/_sidebar.md': '_sidebar.md'
      },
      autoSidebar: false,
      subMaxLevel: 2,
      executeScript: true,
      auto2top: true,
    };
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/docsify-plugin-auto-sidebar/dist/docsify-plugin-auto-sidebar.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
  <!-- Script for loading iframe and code blocks -->
  <script>
    function loadCodeBlock(folder = null, anchorId = null) {
      const scriptAnchor = anchorId ? document.getElementById(anchorId) : document.currentScript;

      // if folder not given, auto-detect from current page
      if (!folder) {
        let pagePath = window.location.hash
          .replace(/^#\/|\/$/g, ''); // remove starting #/ and trailing /
        if (!pagePath) {
          console.error('No page path detected.');
          return;
        }
        let parts = pagePath.split('/');
        if (parts.length > 1) {
          // remove the last part (assume it's filename)
          parts.pop();
        }
        folder = parts.join('/'); // keep only folder path
      }

      console.log('Loading code block from folder:', folder);

      const main = document.getElementById('main');
      if (!main) {
        console.error('Main container not found.');
        return;
      }

      const insertionParent = (scriptAnchor && scriptAnchor.parentNode) ? scriptAnchor.parentNode : main;
      const insertionTarget = scriptAnchor && scriptAnchor.parentNode === insertionParent ? scriptAnchor : null;

      // create <a> to link to the folder
      /*
      const link = document.createElement('a');
      link.setAttribute('href', folder);
      link.setAttribute('target', '_blank');
      link.textContent = 'Open Sketch in New Tab!';
      main.appendChild(link);
      */

      // create <iframe> to display the sketch
      const iframeWrap = document.createElement('div');
      iframeWrap.className = 'sketch-frame-wrap';
      // style
      iframeWrap.style.position = 'relative';
      iframeWrap.style.margin = '10px 0';

      const iframe = document.createElement('iframe');
      iframe.setAttribute('src', folder);
      iframe.setAttribute('width', '100%');
      iframe.setAttribute('width', '800'); // width!
      iframe.setAttribute('height', '400'); // height
      iframe.setAttribute('frameborder', '0');
      iframe.setAttribute('allowfullscreen', 'true');
      // style
      iframe.style.margin = '0';
      iframeWrap.appendChild(iframe);

      const reloadButton = document.createElement('button');
      reloadButton.type = 'button';
      reloadButton.className = 'sketch-action-button sketch-reload-button';
      reloadButton.textContent = 'Reload';
      reloadButton.setAttribute('aria-label', 'Reload sketch');
      // style
      reloadButton.style.position = 'absolute';
      reloadButton.style.zIndex = '2';
      reloadButton.style.display = 'inline-flex';
      reloadButton.style.alignItems = 'center';
      reloadButton.style.justifyContent = 'center';
      reloadButton.style.border = '1px solid rgba(0, 0, 0, 0.12)';
      reloadButton.style.borderRadius = '999px';
      reloadButton.style.background = 'rgba(255, 255, 255, 0.92)';
      reloadButton.style.color = '#1C1678';
      reloadButton.style.fontFamily = "'Raleway', sans-serif";
      reloadButton.style.fontSize = '12px';
      reloadButton.style.fontWeight = '600';
      reloadButton.style.lineHeight = '1';
      reloadButton.style.padding = '0.5rem 0.8rem';
      reloadButton.style.cursor = 'pointer';
      reloadButton.style.boxShadow = '0 6px 18px rgba(0, 0, 0, 0.08)';
      reloadButton.style.transition = 'transform 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease';
      reloadButton.style.top = '12px';
      reloadButton.style.right = '12px';
      reloadButton.addEventListener('click', () => {
        try {
          iframe.contentWindow.location.reload();
        } catch (error) {
          iframe.src = `${folder}/?reload=${Date.now()}`;
        }
      });
      iframeWrap.appendChild(reloadButton);

      if (insertionTarget) {
        insertionParent.insertBefore(iframeWrap, insertionTarget);
      } else {
        main.appendChild(iframeWrap);
      }

      // create <pre><code> structure
      const codeWrap = document.createElement('div');
      codeWrap.className = 'code-block-wrap';
      codeWrap.style.position = 'relative';
      codeWrap.style.margin = '10px 0';

      const copyButton = document.createElement('button');
      copyButton.type = 'button';
      copyButton.className = 'sketch-action-button sketch-copy-button';
      copyButton.textContent = 'Copy';
      copyButton.setAttribute('aria-label', 'Copy code to clipboard');
      copyButton.style.position = 'absolute';
      copyButton.style.zIndex = '2';
      copyButton.style.display = 'inline-flex';
      copyButton.style.alignItems = 'center';
      copyButton.style.justifyContent = 'center';
      copyButton.style.border = '1px solid rgba(0, 0, 0, 0.12)';
      copyButton.style.borderRadius = '999px';
      copyButton.style.background = 'rgba(255, 255, 255, 0.92)';
      copyButton.style.color = '#1C1678';
      copyButton.style.fontFamily = "'Raleway', sans-serif";
      copyButton.style.fontSize = '12px';
      copyButton.style.fontWeight = '600';
      copyButton.style.lineHeight = '1';
      copyButton.style.padding = '0.5rem 0.8rem';
      copyButton.style.cursor = 'pointer';
      copyButton.style.boxShadow = '0 6px 18px rgba(0, 0, 0, 0.08)';
      copyButton.style.transition = 'transform 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease';
      copyButton.style.top = '12px';
      copyButton.style.right = '12px';
      codeWrap.appendChild(copyButton);

      const pre = document.createElement('pre');
      pre.style.margin = '0';
      const code = document.createElement('code');
      code.id = 'code-block';
      code.className = 'language-javascript';
      code.style.display = 'block';
      pre.appendChild(code);
      codeWrap.appendChild(pre);
      if (insertionTarget) {
        insertionParent.insertBefore(codeWrap, insertionTarget);
      } else {
        main.appendChild(codeWrap);
      }

      copyButton.addEventListener('click', async () => {
        const source = code.textContent || '';

        try {
          await navigator.clipboard.writeText(source);
          copyButton.textContent = 'Copied';
          window.setTimeout(() => {
            copyButton.textContent = 'Copy';
          }, 1200);
        } catch (error) {
          const fallback = document.createElement('textarea');
          fallback.value = source;
          fallback.setAttribute('readonly', 'true');
          fallback.style.position = 'absolute';
          fallback.style.left = '-9999px';
          document.body.appendChild(fallback);
          fallback.select();
          document.execCommand('copy');
          document.body.removeChild(fallback);
        }
      });

      // fetch and insert the JS file content
      fetch(folder + '/sketch.js')
        .then(response => {
          if (!response.ok) throw new Error('404 or bad path');
          return response.text();
        })
        .then(text => {
          // console.log('Code block loaded:', text);
          code.textContent = text;
          if (window.Prism) {
            Prism.highlightAll();
          }
        })
        .catch(error => console.error('Failed to load code:', error));
    }
  </script>

</body>

</html>
